<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Throughline Operations Dashboard</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Throughline Control Room</p>
          <h1>Operations Dashboard</h1>
        </div>
        <div class="connection-panel">
          <label for="wsUrl">Gateway</label>
          <input id="wsUrl" value="ws://localhost:8765" />
          <button id="connectButton">Connect</button>
          <span id="wsStatus" class="badge badge-muted">MOCK</span>
        </div>
      </header>

      <section class="status-grid" id="statusGrid"></section>

      <section class="dashboard-grid">
        <aside class="panel process-panel">
          <div class="panel-heading">
            <p class="eyebrow">Process</p>
            <h2>공정 흐름</h2>
          </div>
          <div id="processFlow" class="process-flow"></div>
        </aside>

        <section class="monitoring-stack">
          <div class="panel highlight-panel">
            <div class="panel-heading row-between">
              <div>
                <p class="eyebrow">Current Job</p>
                <h2 id="jobTitle">-</h2>
              </div>
              <span id="systemState" class="badge">-</span>
            </div>
            <div id="jobSummary" class="metric-grid"></div>
          </div>

          <div class="card-grid">
            <article class="panel" id="robotPanel"></article>
            <article class="panel" id="visionPanel"></article>
            <article class="panel" id="modbusPanel"></article>
            <article class="panel" id="healthPanel"></article>
          </div>
        </section>

        <aside class="control-stack">
          <section class="panel danger-panel">
            <div class="panel-heading">
              <p class="eyebrow">Control</p>
              <h2>제어 패널</h2>
            </div>
            <div class="button-grid">
              <button data-command="process.start">Start</button>
              <button data-command="process.pause">Pause</button>
              <button data-command="process.stop" class="warning">Stop</button>
              <button data-command="process.reset_error">Reset Error</button>
              <button data-command="robot.home" class="secondary">Home Robot</button>
              <button data-command="system.refresh" class="secondary">Refresh</button>
            </div>
            <p class="hint">MVP1: 버튼은 실제 장비를 제어하지 않고 command payload와 event만 생성합니다.</p>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <p class="eyebrow">Alarms</p>
              <h2>알람</h2>
            </div>
            <div id="alarmList" class="alarm-list"></div>
          </section>
        </aside>
      </section>

      <section class="panel event-panel">
        <div class="panel-heading row-between">
          <div>
            <p class="eyebrow">Events</p>
            <h2>이벤트 로그</h2>
          </div>
          <button id="clearEvents" class="secondary small">Clear</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Severity</th>
                <th>Source</th>
                <th>Message</th>
              </tr>
            </thead>
            <tbody id="eventLog"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./src/app.js"></script>
  </body>
</html>
